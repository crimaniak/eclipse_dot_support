name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package
        working-directory: eclipse_dot_support.parent

      - name: Upload update site
        uses: actions/upload-artifact@v4
        with:
          name: update-site
          path: eclipse_dot_support.site/target/repository/
          if-no-files-found: error
